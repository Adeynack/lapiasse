name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
      - name: Generate
        run:
          make gen && ./scripts/git_tracked_are_unmodified
      - name: Build
        run: make build
      - name: Lint
        run: make lint
      - name: Test
        run: make test
        env:
          TEST_LOG: fail
