openapi: 3.0.0
info:
  title: La Piasse
  version: 0.0.0
tags: []
paths:
  /books:
    get:
      operationId: Books_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaginatedRequest'
    post:
      operationId: Books_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: '#/components/schemas/Book'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
components:
  schemas:
    Book:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - name
        - default_currency_iso_code
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        name:
          type: string
        default_currency_iso_code:
          type: string
    PaginatedRequest:
      type: object
      required:
        - page
        - page_size
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
          default: 1
        page_size:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
          default: 50
    Resource:
      type: object
      required:
        - id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
